# Azure DevOps Pipeline for BDD TypeScript Playwright Framework
# Adapted from Katalon pipeline structure

parameters:
  - name: xPath
    type: string
    default: '\\fei\department\XA\Common\Build_Test_Results'
    displayName: 'Shared Network Path for Reports'
  
  - name: Environment
    type: string
    default: 'qa'
    displayName: 'Test Environment'
    values:
      - qa
      - std-f1
      - std-f2
      - std-f3
      - std-f4
  
  - name: TestSuite
    type: string
    default: 'all'
    displayName: 'Test Suite'
    values:
      - all
      - smoke
      - org
  
  - name: Browser
    type: string
    default: 'chromium'
    displayName: 'Browser'
    values:
      - chromium
      - firefox
      - webkit

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - docs/*

pool: 
  name: 'Interactive'  # Use your agent pool name

variables:
  nodeVersion: '20.x'
  newXPath: ''

jobs:
  - job: BDD_Regression_Tests
    displayName: 'BDD Regression Tests - ${{ parameters.Environment }}'
    timeoutInMinutes: 720
    
    steps:
      # Step 1: Create timestamped directory for reports
      - powershell: |
          $date = Get-Date -Format 'yyyy-MM-dd'
          $newTargetPath = "${{ parameters.xPath }}\${{ parameters.Environment }}\$date-$(Build.BuildId)"
          New-Item -ItemType Directory -Force -Path $newTargetPath
          Write-Host "##vso[task.setvariable variable=newXPath;isOutput=true]$newTargetPath"
          Write-Host "Created report directory: $newTargetPath"
        displayName: 'Create Report Directory'
        name: setVarStep
      
      # Step 2: Display environment variables
      - task: CmdLine@2
        displayName: 'Display Environment Variables'
        inputs:
          script: 'set'
      
      # Step 3: Setup Node.js
      - task: NodeTool@0
        displayName: 'Install Node.js ${{ variables.nodeVersion }}'
        inputs:
          versionSpec: '${{ variables.nodeVersion }}'
      
      # Step 4: Install dependencies
      - script: |
          npm ci
        displayName: 'Install NPM Dependencies'
      
      # Step 5: Install Playwright browsers
      - script: |
          npx playwright install --with-deps ${{ parameters.Browser }}
        displayName: 'Install Playwright Browser - ${{ parameters.Browser }}'
      
      # Step 6: Run tests based on suite and environment
      - script: |
          $env:BROWSER = "${{ parameters.Browser }}"
          
          if ("${{ parameters.TestSuite }}" -eq "smoke") {
            npm run test:smoke
          } elseif ("${{ parameters.TestSuite }}" -eq "org") {
            npm run test:org
          } elseif ("${{ parameters.Environment }}" -eq "qa") {
            npm run test:qa
          } elseif ("${{ parameters.Environment }}" -eq "std-f1") {
            npm run test:std-f1
          } else {
            npm test
          }
        displayName: 'Run BDD Tests - ${{ parameters.TestSuite }}'
        timeoutInMinutes: 720
        continueOnError: true
        env:
          BASE_URL: $(BASE_URL_${{ upper(parameters.Environment) }})
          USERNAME: $(USERNAME_${{ upper(parameters.Environment) }})
          PASSWORD: $(PASSWORD_${{ upper(parameters.Environment) }})
          ORGANIZATION: $(ORGANIZATION_${{ upper(parameters.Environment) }})
          LOCATION: $(LOCATION_${{ upper(parameters.Environment) }})
          STAFF_MEMBER: $(STAFF_MEMBER_${{ upper(parameters.Environment) }})
          HEADLESS: true
      
      # Step 7: Check test exit code
      - powershell: |
          if ($LASTEXITCODE -eq 2 -or $LASTEXITCODE -eq 3) {
            Write-Host "##vso[task.complete result=SucceededWithIssues;]Tests completed with warnings"
          } elseif ($LASTEXITCODE -eq 1) {
            Write-Host "##vso[task.complete result=Failed;]Tests failed"
          } else {
            Write-Host "Tests completed successfully"
          }
        displayName: 'Check Test Exit Code'
        condition: always()
      
      # Step 8: Parse test results and create dashboard
      - powershell: |
          $jsonPath = "reports/cucumber-report.json"
          
          if (Test-Path $jsonPath) {
            $json = Get-Content $jsonPath | ConvertFrom-Json
            
            $totalScenarios = 0
            $passedScenarios = 0
            $failedScenarios = 0
            $totalDuration = 0
            
            foreach ($feature in $json) {
              foreach ($scenario in $feature.elements) {
                $totalScenarios++
                $steps = $scenario.steps
                $failed = $steps | Where-Object { $_.result.status -eq "failed" }
                
                if ($failed.Count -gt 0) {
                  $failedScenarios++
                } else {
                  $passedScenarios++
                }
                
                foreach ($step in $steps) {
                  if ($step.result.duration) {
                    $totalDuration += $step.result.duration
                  }
                }
              }
            }
            
            $durationSeconds = [math]::Round($totalDuration / 1000000000, 2)
            $passRate = if ($totalScenarios -gt 0) { [math]::Round(($passedScenarios / $totalScenarios) * 100, 2) } else { 0 }
            
            $html = @"
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>BDD Test Execution Report</title>
              <style>
                  body {
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      margin: 0;
                      padding: 20px;
                  }
                  .container {
                      max-width: 1200px;
                      margin: auto;
                      background: white;
                      border-radius: 10px;
                      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
                      overflow: hidden;
                  }
                  .header {
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      padding: 30px;
                      text-align: center;
                  }
                  .header h1 {
                      margin: 0;
                      font-size: 32px;
                  }
                  .header p {
                      margin: 10px 0 0 0;
                      opacity: 0.9;
                  }
                  .summary {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                      gap: 20px;
                      padding: 30px;
                  }
                  .card {
                      background: #f8f9fa;
                      padding: 25px;
                      border-radius: 10px;
                      text-align: center;
                      border-left: 4px solid #667eea;
                  }
                  .card.passed {
                      border-left-color: #4caf50;
                  }
                  .card.failed {
                      border-left-color: #f44336;
                  }
                  .card h3 {
                      margin: 0 0 10px 0;
                      color: #666;
                      font-size: 14px;
                      text-transform: uppercase;
                  }
                  .card .value {
                      font-size: 42px;
                      font-weight: bold;
                      color: #333;
                  }
                  .card.passed .value {
                      color: #4caf50;
                  }
                  .card.failed .value {
                      color: #f44336;
                  }
                  .details {
                      padding: 30px;
                      background: #fafafa;
                  }
                  .details table {
                      width: 100%;
                      border-collapse: collapse;
                      background: white;
                      border-radius: 8px;
                      overflow: hidden;
                  }
                  .details th {
                      background: #667eea;
                      color: white;
                      padding: 15px;
                      text-align: left;
                  }
                  .details td {
                      padding: 15px;
                      border-bottom: 1px solid #eee;
                  }
                  .footer {
                      padding: 20px;
                      text-align: center;
                      color: #666;
                      font-size: 14px;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>🎯 BDD Test Execution Report</h1>
                      <p>Environment: ${{ parameters.Environment }} | Browser: ${{ parameters.Browser }} | Suite: ${{ parameters.TestSuite }}</p>
                      <p>Build: $(Build.BuildNumber) | Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')</p>
                  </div>
                  
                  <div class="summary">
                      <div class="card">
                          <h3>Total Scenarios</h3>
                          <div class="value">$totalScenarios</div>
                      </div>
                      <div class="card passed">
                          <h3>Passed</h3>
                          <div class="value">$passedScenarios</div>
                      </div>
                      <div class="card failed">
                          <h3>Failed</h3>
                          <div class="value">$failedScenarios</div>
                      </div>
                      <div class="card">
                          <h3>Pass Rate</h3>
                          <div class="value">$passRate%</div>
                      </div>
                      <div class="card">
                          <h3>Duration</h3>
                          <div class="value">$durationSeconds<span style="font-size: 20px;">s</span></div>
                      </div>
                  </div>
                  
                  <div class="details">
                      <h2>Test Execution Details</h2>
                      <table>
                          <tr>
                              <th>Metric</th>
                              <th>Value</th>
                          </tr>
                          <tr>
                              <td>Environment</td>
                              <td>${{ parameters.Environment }}</td>
                          </tr>
                          <tr>
                              <td>Browser</td>
                              <td>${{ parameters.Browser }}</td>
                          </tr>
                          <tr>
                              <td>Test Suite</td>
                              <td>${{ parameters.TestSuite }}</td>
                          </tr>
                          <tr>
                              <td>Build Number</td>
                              <td>$(Build.BuildNumber)</td>
                          </tr>
                          <tr>
                              <td>Build ID</td>
                              <td>$(Build.BuildId)</td>
                          </tr>
                          <tr>
                              <td>Agent</td>
                              <td>$(Agent.MachineName)</td>
                          </tr>
                      </table>
                  </div>
                  
                  <div class="footer">
                      <p>Generated by Azure DevOps Pipeline | QA Automation Team</p>
                  </div>
              </div>
          </body>
          </html>
"@
            
            $html | Out-File "$(Build.ArtifactStagingDirectory)\dashboard.html" -Encoding utf8
            Write-Host "Dashboard created successfully"
          } else {
            Write-Host "##vso[task.logissue type=warning]Cucumber report not found"
          }
        displayName: 'Generate Test Dashboard'
        condition: always()
      
      # Step 9: Publish HTML dashboard
      - task: PublishHtmlReport@1
        displayName: 'Publish HTML Dashboard'
        condition: always()
        inputs:
          reportDir: '$(Build.ArtifactStagingDirectory)'
          tabName: 'Test Dashboard'
      
      # Step 10: Publish dashboard artifact
      - task: PublishBuildArtifacts@1
        displayName: 'Publish Dashboard Artifact'
        condition: always()
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)\dashboard.html'
          ArtifactName: 'dashboard-${{ parameters.Environment }}-${{ parameters.Browser }}'
          publishLocation: 'Container'
      
      # Step 11: Publish Katalon-style report
      - task: PublishBuildArtifacts@1
        displayName: 'Publish Katalon Report'
        condition: always()
        inputs:
          PathtoPublish: '$(Build.SourcesDirectory)\reports'
          ArtifactName: 'katalon-report-${{ parameters.Environment }}-${{ parameters.Browser }}'
          publishLocation: 'Container'
      
      # Step 12: Publish to network share
      - task: PublishBuildArtifacts@1
        displayName: 'Publish to Network Share'
        condition: always()
        inputs:
          PathtoPublish: '$(Build.SourcesDirectory)\reports'
          ArtifactName: '$(Build.DefinitionName)-${{ parameters.Environment }}-${{ parameters.Browser }}'
          publishLocation: 'FilePath'
          TargetPath: '${{ parameters.xPath }}\${{ parameters.Environment }}'
      
      # Step 13: Publish test results to Azure DevOps
      - task: PublishTestResults@2
        displayName: 'Publish Test Results'
        condition: always()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: 'reports/cucumber-report.json'
          testRunTitle: 'BDD Tests - ${{ parameters.Environment }} - ${{ parameters.Browser }}'
          mergeTestResults: true
          failTaskOnFailedTests: false
      
      # Step 14: Send email notification
      - powershell: |
          $smtpServer = "smtp.feisystems.com"
          $smtpFrom = "qa-automation@feisystems.com"
          $smtpTo = "qa-team@feisystems.com"
          $buildNumber = "$(Build.BuildId)"
          $buildUrl = "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
          
          $messageSubject = "BDD Test Results - ${{ parameters.Environment }} - Build $buildNumber"
          $messageBody = @"
          Dear Team,

          The BDD test execution for ${{ parameters.Environment }} environment is completed.

          Test Suite: ${{ parameters.TestSuite }}
          Browser: ${{ parameters.Browser }}
          Build Number: $buildNumber
          
          Please find the attached dashboard for summary results.
          
          For detailed results, please visit:
          $buildUrl

          Thank you,
          QA Automation Team
"@
          
          $attachmentPath = "$(Build.ArtifactStagingDirectory)\dashboard.html"
          
          if (Test-Path $attachmentPath) {
            $msg = New-Object Net.Mail.MailMessage
            $msg.From = $smtpFrom
            $msg.To.Add($smtpTo)
            $msg.Subject = $messageSubject
            $msg.Body = $messageBody
            $msg.Attachments.Add($attachmentPath)
            
            $smtp = New-Object Net.Mail.SmtpClient($smtpServer)
            $smtp.Send($msg)
            
            Write-Host "Email sent successfully"
          } else {
            Write-Host "##vso[task.logissue type=warning]Dashboard file not found, skipping email"
          }
        displayName: 'Send Email Notification'
        condition: and(always(), eq(variables['Build.Reason'], 'Manual'))
        continueOnError: true
